<!DOCTYPE html>
<html>
<head>
  <title>Per te 🤍</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial;
      background: linear-gradient(pink, #ff4d6d);
      text-align: center;
      padding: 40px;
      color: white;
      overflow-x: hidden;
      min-height: 100vh;
    }

    h1 {
      font-size: 45px;
      margin-bottom: 20px;
    }

    /* Hero Image */
    .hero-image {
      width: 100%;
      max-width: 500px;
      height: 400px;
      border-radius: 15px;
      object-fit: cover;
      box-shadow: 0 0 25px rgba(255,255,255,0.4);
      margin: 20px auto;
      display: block;
    }

    .box {
      background: rgba(255,255,255,0.2);
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
      box-shadow: 0 0 15px rgba(255,255,255,0.3);
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 16px;
      background: rgba(255,255,255,0.3);
      color: white;
      transition: 0.3s;
    }

    button:hover {
      background: rgba(255,255,255,0.5);
    }

    /* cuori */
    .heart {
      position: fixed;
      top: -10px;
      font-size: 20px;
      animation: fall linear infinite;
      z-index: 1;
    }

    @keyframes fall {
      to { transform: translateY(100vh); }
    }

    /* lettera */
    .letter {
      margin-top: 20px;
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
      transform: scaleY(0);
      transform-origin: top;
      transition: 0.6s ease;
      overflow: hidden;
    }

    .letter.open {
      transform: scaleY(1);
    }

    /* Carosello */
    .carousel-container {
      position: relative;
      max-width: 500px;
      margin: 30px auto;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(255,255,255,0.4);
    }

    .carousel {
      display: flex;
      transition: transform 0.5s ease;
    }

    .carousel img {
      width: 100%;
      height: 400px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .carousel-controls {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 2;
    }

    .carousel-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: 0.3s;
    }

    .carousel-dot.active {
      background: white;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.3);
      color: white;
      border: none;
      font-size: 24px;
      padding: 10px 15px;
      cursor: pointer;
      z-index: 2;
      transition: 0.3s;
    }

    .carousel-btn:hover {
      background: rgba(255,255,255,0.5);
    }

    .carousel-btn.prev {
      left: 10px;
    }

    .carousel-btn.next {
      right: 10px;
    }

  </style>
</head>

<body>

<h1>🤍 Per te 🤍</h1>

<div class="box">
  <p>Questo sito è dedicato a te.<br>Sei la cosa più bella che mi sia capitata.</p>
</div>

<!-- Hero Image -->
<img src="images/hero.jpg" alt="Noi" class="hero-image">

<div class="box">
  <p>🤍 Ti amo oggi, domani e per sempre 🤍</p>
</div>

<!-- Carosello Foto -->
<div class="carousel-container">
  <div class="carousel" id="carousel">
    <img src="images/photo1.jpg" alt="Foto 1">
    <img src="images/photo2.jpg" alt="Foto 2">
  </div>
  
  <button class="carousel-btn prev" onclick="prevSlide()">❮</button>
  <button class="carousel-btn next" onclick="nextSlide()">❯</button>
  
  <div class="carousel-controls">
    <div class="carousel-dot active" onclick="goToSlide(0)"></div>
    <div class="carousel-dot" onclick="goToSlide(1)"></div>
  </div>
</div>

<button onclick="openLetter()">💌 Apri la lettera</button>

<div class="letter" id="letter">
  Sei la persona più importante della mia vita.<br><br>
  Non è solo amore, è casa.<br><br>
  E se potessi scegliere di nuovo, sceglierei sempre te 🤍
</div>

<!-- Audio YouTube -->
<audio autoplay loop style="display:none;">
  <source src="https://www.youtube.com/watch?v=1AUR6QqAn9A" type="audio/mpeg">
</audio>

<script>
/* cuori */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "🤍";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}, 300);

/* lettera animata */
function openLetter() {
  document.getElementById("letter").classList.add("open");
}

/* Carosello */
let currentSlide = 0;
const totalSlides = 2;

function showSlide(n) {
  const carousel = document.getElementById("carousel");
  carousel.style.transform = `translateX(-${n * 100}%)`;
  
  document.querySelectorAll(".carousel-dot").forEach((dot, index) => {
    dot.classList.toggle("active", index === n);
  });
}

function nextSlide() {
  currentSlide = (currentSlide + 1) % totalSlides;
  showSlide(currentSlide);
}

function prevSlide() {
  currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
  showSlide(currentSlide);
}

function goToSlide(n) {
  currentSlide = n;
  showSlide(currentSlide);
}

// Auto-play carosello ogni 5 secondi
setInterval(nextSlide, 5000);
</script>

</body>
</html>
