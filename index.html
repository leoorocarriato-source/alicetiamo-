<!DOCTYPE html>
<html>
<head>
  <title>Per te 🤍</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial;
      background: linear-gradient(135deg, #ff69b4, #ff4d6d);
      background-attachment: fixed;
      text-align: center;
      padding: 40px;
      color: white;
      overflow-x: hidden;
      min-height: 100vh;
    }

    h1 {
      font-size: 45px;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    /* Hero Image */
    .hero-image {
      width: 100%;
      max-width: 500px;
      height: 400px;
      border-radius: 15px;
      object-fit: cover;
      box-shadow: 0 0 25px rgba(255,255,255,0.4);
      margin: 20px auto;
      display: block;
    }

    .box {
      background: rgba(255,255,255,0.2);
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
      box-shadow: 0 0 15px rgba(255,255,255,0.3);
      backdrop-filter: blur(10px);
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 16px;
      background: rgba(255,255,255,0.3);
      color: white;
      transition: 0.3s;
      font-weight: bold;
    }

    button:hover {
      background: rgba(255,255,255,0.5);
      transform: scale(1.05);
    }

    /* cuori */
    .heart {
      position: fixed;
      top: -10px;
      font-size: 20px;
      animation: fall linear infinite;
      z-index: 1;
      pointer-events: none;
    }

    @keyframes fall {
      to { transform: translateY(100vh); }
    }

    /* lettera */
    .letter {
      margin-top: 20px;
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
      transform: scaleY(0);
      transform-origin: top;
      transition: 0.6s ease;
      overflow: hidden;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.8;
    }

    .letter.open {
      transform: scaleY(1);
    }

    /* Audio Player */
    .audio-player {
      margin-top: 30px;
      padding: 15px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    audio {
      width: 100%;
      outline: none;
    }

  </style>
</head>

<body>

<h1>🤍 Per te 🤍</h1>

<div class="box">
  <p>Questo sito è dedicato a te.<br>Sei la cosa più bella che mi sia capitata.</p>
</div>

<!-- Hero Image -->
<img src="https://files.catbox.moe/6d9cb5.jpeg" alt="Noi" class="hero-image">

<div class="box">
  <p>🤍 Ti amo oggi, domani e per sempre 🤍</p>
</div>

<button onclick="openLetter()">💌 Apri la lettera</button>

<div class="letter" id="letter">
  Sei la persona più importante della mia vita.<br><br>
  Non è solo amore, è casa.<br><br>
  E se potessi scegliere di nuovo, sceglierei sempre te 🤍
</div>

<!-- Audio Player YouTube -->
<div class="audio-player">
  <p style="font-size: 14px; margin-bottom: 10px;">🎵 La nostra musica 🎵</p>
  <iframe width="100%" height="60" src="https://www.youtube.com/embed/1AUR6QqAn9A?autoplay=1&loop=1" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
</div>

<script>
/* cuori che cadono */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "🤍";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}, 300);

/* lettera animata */
function openLetter() {
  const letter = document.getElementById("letter");
  letter.classList.add("open");
  
  // Aggiungi effetto sonoro (opzionale)
  // Se vuoi un suono quando si apre la lettera
}
</script>

</body>
</html>
